<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyView • Weather Dashboard</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">
    <h1>
      <i class="fas fa-cloud-sun-rain"></i> SkyView
    </h1>

    <div class="search-section">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off" />
      </div>
      <button id="searchBtn"><i class="fas fa-location-dot"></i> Search</button>
    </div>

    <!-- Search history container -->
    <div class="history-panel" id="historyPanel">
      <div class="history-label">
        <i class="fas fa-history"></i> <span>Recent</span>
      </div>
      <div class="history-tags" id="historyTags"></div>
      <button id="clearHistoryBtn" class="clear-history-btn" title="Clear search history"><i class="fas fa-trash-alt"></i> Clear</button>
    </div>

    <!-- Current weather display -->
    <div id="currentWeatherContainer">
      <div class="weather-now-card" id="currentCard" style="display: none;">
        <div class="city-main">
          <div class="city-name">
            <span id="cityDisplay"></span><span id="countryBadge"></span>
          </div>
          <div class="date-today" id="currentDate"></div>
          <div class="details">
            <span><i class="fas fa-droplet"></i> <span id="humidity"></span>%</span>
            <span><i class="fas fa-wind"></i> <span id="wind"></span> m/s</span>
          </div>
        </div>
        <div class="temp-area">
          <i id="currentWeatherIcon" class="weather-icon-lg fas fa-sun"></i>
          <div class="temperature"><span id="currentTemp"></span>°C</div>
        </div>
        <div style="font-size: 1.1rem; color: #f0e6d2;" id="description"></div>
      </div>
    </div>

    <!-- 5-day forecast -->
    <div class="forecast-title">
      <i class="fas fa-calendar-alt"></i> 5-Day Forecast
    </div>
    <div class="forecast-grid" id="forecastGrid"></div>
    
    <div id="errorBox" style="margin-top: 0.8rem;"></div>
  </div>

<script src="script.js"></script>

</body>
</html>
